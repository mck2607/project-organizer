<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Submission</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/project_form.css">
</head>
<body>

<div class="container">
  {% if success %}
    <div class="alert success">
      ✅ Data uploaded successfully!.
    </div>
  {% endif %}

  <div class="form-header">
    <h1>📁 Project Organizer</h1>
    <p>Actowiz Data Solutions</p>
  </div>
  <form id="project_form" class="form" enctype="multipart/form-data">
    <input type="hidden" name="project_state" value="pending">
    <input type="hidden" value="{{ user.position }}" id="project_assigner_position" name="project_assigner_position">
    <input type="hidden" value="{{ user.username }}" id="project_assigner_username" name="project_assigner_username">
    <!-- Section 1: Project Information -->
    <section>
      <h2>Project Information</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="project_name">Project Name <span class="required">*</span></label>
          <input type="text" id="project_name" name="project_name" required>
        </div>
        <div class="form-group">
          <label for="project_assigner_name">Project Assigner Name</label>
          <input type="text" id="project_assigner_name" name="project_assigner_name", value="{{ user.name }}" readonly>
        </div>
        <div class="form-group">
          <label for="project_assigner_email">Project Assigner Email</label>
          <input type="email" id="project_assigner_email" name="project_assigner_email" , value="{{ user.email }}" readonly>
        </div>
        <div class="form-group">
          <label for="assigned_person_username">Assigned Person Name<span class="required">*</span></label>
          <select id="assigned_person_username" name="assigned_person_username" required>
            <option value="">-- Select Person --</option>
            {% for dev in developers %}
              <option value="{{ dev.username }}">{{ dev.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="estimated_date_time">Estimated Date & Time (Sales)<span class="required">*</span></label>
          <input type="datetime-local" id="estimated_date_time" name="estimated_date_time" required>
        </div>
        <div class="form-group">
          <label for="expected_date_time">Expected Date & Time (Ops.)</label>
          <input type="datetime-local" id="expected_date_time" name="expected_date_time">
        </div>
      </div>
    </section>
    <!-- Section 2: Platform & Frequency -->
    <section>
      <h2>Platform & Frequency</h2>
      <div class="form-group">
        <label for="platform_type">Platform Type <span class="required">*</span></label>
        <select id="platform_type" name="platform_type" required>
          <option value="">-- Select Platform Type --</option>
          <option value="web_scraping">Web Scraping</option>
          <option value="app_scraping">App Scraping</option>
          <option value="dashboard">Dashboard</option>
          <option value="web_app_both">Web & App Both</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="frequency_type">Frequency Type <span class="required">*</span></label>
        <select id="frequency_type" name="frequency_type" required>
          <option value="">-- Select Frequency Type --</option>
          <option value="once-off">Once-Off</option>
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
          <option value="alternate">Alternate</option>
          <option value="daily">Daily</option>
          <option value="other">Other</option>
        </select>
      </div>
    </section>
    <!-- Section 3: Description and Uploads -->
    <section>
      <h2>Project Key Points</h2>
      <!-- Key Points Input -->
      <div class="form-group">
        <label for="key_point_input">Project Key Points</label>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="key_point_input" placeholder="Enter a key point..." />
          <button type="button" id="add_key_point" class="btn">Add</button>
        </div>
        <ul id="key_points_list"></ul>
        <!-- Hidden field to store final key points -->
        <input type="hidden" name="project_key_points" id="project_key_points">
      </div>
      <!-- Multiple Files Upload -->
      <div class="form-group">
        <label for="project_files">
          Upload Project Files
          <i>(PDF, DOC, DOCX, XLSX, CSV, TXT, ZIP, PNG, JPG, JPEG (Max: 2GB each))</i>
          <span class="required">*</span>
        </label>

        <!-- File input -->
        <input type="file"
               id="project_files"
               name="project_files"
               accept=".pdf,.doc,.docx,.xlsx,.csv,.txt,.zip,.png,.jpg,.jpeg"
               multiple
               required>

        <!-- Custom file list -->
        <ul id="file_list"></ul>
      </div>
      <div class="form-group">
        <label for="project_videos">Upload Project Video</label>
        <input type="file" id="project_videos" name="project_videos" multiple accept="video/*">
      </div>
    </section>

    <!-- Section 4: Actions -->
    <div class="form-actions">
      <button type="reset" class="btn outline">Reset</button>
      <button type="submit" class="btn">Submit</button>
      <p class="note"><span class="required">*</span> Required fields</p>
    </div>

  </form>
</div>

</body>
<script>
  // Key points handling
  const keyInput = document.getElementById("key_point_input");
  const addBtn = document.getElementById("add_key_point");
  const list = document.getElementById("key_points_list");
  const hiddenField = document.getElementById("project_key_points");
  let keyPoints = [];

  addBtn.addEventListener("click", () => {
    const value = keyInput.value.trim();
    if (value) {
      keyPoints.push(value);
      renderList();
      keyInput.value = "";
    }
  });

  function renderList() {
    list.innerHTML = "";
    keyPoints.forEach((point, index) => {
      const li = document.createElement("li");

      // point text (editable)
      const span = document.createElement("span");
      span.textContent = point;
      span.style.marginRight = "10px";

      // Edit button
      const editBtn = document.createElement("button");
      editBtn.textContent = "✏️";
      editBtn.style.marginLeft = "5px";
      editBtn.style.background = "yellow";
      editBtn.onclick = () => {
        const newValue = prompt("Edit key point:", point);
        if (newValue !== null && newValue.trim() !== "") {
          keyPoints[index] = newValue.trim();
          renderList();
        }
      };

      // Remove button with confirmation
      const removeBtn = document.createElement("button");
      removeBtn.textContent = "❌";
      removeBtn.style.marginLeft = "5px";
      removeBtn.onclick = () => {
        if (confirm("Are you sure you want to delete this key point?")) {
          keyPoints.splice(index, 1);
          renderList();
        }
      };

      li.appendChild(span);
      li.appendChild(editBtn);
      li.appendChild(removeBtn);
      list.appendChild(li);
    });
    hiddenField.value = keyPoints.join("||"); // send as string to backend
  }

  // File handling
  const fileInput = document.getElementById("project_files");
  const fileList = document.getElementById("file_list");
  let dt = new DataTransfer();

  fileInput.addEventListener("change", () => {
    for (let file of fileInput.files) {
      dt.items.add(file); // add new files
    }
    fileInput.files = dt.files; // sync input
    renderFileList();
  });

  function renderFileList() {
    fileList.innerHTML = "";
    [...dt.files].forEach((file, index) => {
      const li = document.createElement("li");
      li.textContent = file.name;

      const removeBtn = document.createElement("button");
      removeBtn.textContent = "❌";
      removeBtn.style.marginLeft = "10px";
      removeBtn.onclick = () => {
        if (confirm("Are you sure you want to delete this file?")) {
          dt.items.remove(index);      // remove file
          fileInput.files = dt.files;  // sync input
          renderFileList();            // re-render
        }
      };

      li.appendChild(removeBtn);
      fileList.appendChild(li);
    });
  }

  // Form submit
  const form = document.getElementById("project_form");
  form.addEventListener("submit", async function (e) {
    e.preventDefault(); // stop normal form submission
    const formData = new FormData(form);
    try {
      const response = await fetch("/project-form-submit", {
        method: "POST",
        body: formData
      });
      if (!response.ok) {
        throw new Error("Server error: " + response.status);
      }
      const data = await response.json();
      if (data.success) {
        alert(data.message);
        window.location.href = "/";
      }
    } catch (err) {
      console.error("❌ Error submitting form:", err);
      alert("Failed to submit project form. Please try again.");
    }
  });
</script>

</html>
