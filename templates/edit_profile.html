<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link rel="stylesheet" href="/static/edit_profile.css">
</head>
<body>
  <div class="form-container">
    <h2>Edit Employee Profile</h2>
    <form action="/update_profile2" method="POST">
      <input type="hidden" name="username" value="{{ user.username }}">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" value="{{ user.name }}" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" value="{{ user.phone }}" maxlength="10">
      </div>

      <div class="form-group">
        <label for="date_joined">Date Joined</label>
        <input type="text" id="date_joined" name="date_joined" value="{{ user.date_joined }}" readonly>
      </div>
      <div class="form-group">
        <label for="position">Position <span class="required-note">*</span></label>
        <select id="position" name="position" required>
          <option value="{{ user.position }}">-- Select Position --</option>
          <option value="python developer consultant">Python Developer Consultant</option>
          <option value="senior python developer">Senior Python Developer</option>
          <option value="project manager">Project Manager</option>
          <option value="team leader">Team Leader</option>
          <option value="project coordinator">Project Coordinator</option>
          <option value="rnd developer">Research & Development Person</option>
          <option value="quality analyst person">Quality Analyst Person</option>
          <option value="sales executive">Sales Executive</option>
          <option value="sales manager">Sales Manager</option>
          <option value="hr">Human Resource Management Person</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="department">Department <span class="required-note">*</span></label>
            <select id="department" name="department" required>
              <option value="{{ user.department }}">-- Select Department --</option>
              <option value="operation">Operation</option>
              <option value="sales">Sales</option>
              <option value="rnd">Research & Development</option>
              <option value="other">Other</option>
            </select>
      </div>
      <div class="form-group">
        <label for="reporting_person_name">Reporting Person Name</label>
        <input type="text" id="reporting_person_name" name="reporting_person_name" value="{{ user.reporting_person_name }}">
      </div>
      <div class="form-group">
        <label for="reporting_person_email">Reporting Person Email</label>
        <input type="email" id="reporting_person_email" name="reporting_person_email" value="{{ user.reporting_person_email }}">
      </div>

      <div class="form-group">
        <label for="reporting_person_position">Reporting Person Position</label>
        <input type="text" id="reporting_person_position" name="reporting_person_position" value="{{ user.reporting_person_position }}">
      </div>

      <div class="form-group">
        <label for="reporting_person_username">Reporting Person Username</label>
        <input type="text" id="reporting_person_username" name="reporting_person_username" value="{{ user.reporting_person_username }}">
      </div>
      <div class="form-group">
        <button type="submit">Update Profile</button>
      </div>
    </form>
  </div>
</body>
</html>
