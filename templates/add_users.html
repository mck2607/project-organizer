<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Data Upload</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; padding: 50px; }
    #uploadBox { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
    input[type="file"] { margin: 20px 0; }
    button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #45a049; }
    #message { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="uploadBox">
    <h2>Upload Employee Data</h2>
    <input type="file" id="fileInput" accept=".xlsx">
    <br>
    <button onclick="uploadFile()">Upload</button>
    <p id="message"></p>
  </div>

  <script>
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];
      if (!file) {
        document.getElementById("message").innerText = "Please select a file!";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("/signup-form", {
          method: "POST",
          body: formData
        });

        const result = await response.json();
        document.getElementById("message").innerText = result.message;
      } catch (error) {
        document.getElementById("message").innerText = "Upload failed! Try again";
      }
    }
  </script>
</body>
</html>
