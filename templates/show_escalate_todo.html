
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalated Tasks Dashboard</title>
    <meta name="description" content="Manage and track your escalated project tasks">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f6f3;
            --bg-tertiary: #f1f1ef;
            --text-primary: #37352f;
            --text-secondary: #787774;
            --text-tertiary: #9b9a97;
            --border: #e9e9e7;
            --shadow: 0 1px 3px rgba(15, 15, 15, 0.1);
            --shadow-lg: 0 16px 70px rgba(15, 15, 15, 0.1);
            --accent-blue: #0f7b0f;
            --accent-red: #eb5757;
            --accent-yellow: #f2c94c;
            --accent-green: #27ae60;
            --hover-bg: rgba(55, 53, 47, 0.08);
            --panel-width: 600px;
        }

        [data-theme="dark"] {
            --bg-primary: #191919;
            --bg-secondary: #2f2f2f;
            --bg-tertiary: #373737;
            --text-primary: #ffffff;
            --text-secondary: #9b9a97;
            --text-tertiary: #6f6e69;
            --border: #373737;
            --hover-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 24px;
            height: 24px;
            color: var(--accent-red);
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s ease;
        }

        .theme-toggle:hover {
            background: var(--hover-bg);
        }

        /* Filter Tabs */
        .filter-tabs {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px 0;
            display: flex;
            gap: 8px;
        }

        .filter-tab {
            background: transparent;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-tab:hover {
            background: var(--hover-bg);
        }

        .filter-tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .filter-count {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            min-width: 20px;
            text-align: center;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
        }

        /* Board Container */
        .board-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .board-column {
            min-width: 280px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .column-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .column-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .column-count {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .column-content {
            padding: 16px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Task Cards */
        .task-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .task-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .status-badge.todo {
            background: #f1f3f4;
            color: #5f6368;
        }

        .status-badge.progress {
            background: #fef7e0;
            color: #92400e;
        }

        .status-badge.completed {
            background: #dcfce7;
            color: #166534;
        }

        .task-project {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .task-project-icon {
            width: 12px;
            height: 12px;
        }

        .task-assignee {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .task-assignee-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
        }

        .task-dates {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        /* Side Panel */
        .side-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 15, 0.1);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .side-panel-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--panel-width);
            height: 100vh;
            background: var(--bg-primary);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            z-index: 1001;
        }

        .side-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 10;
        }

        .panel-close {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .panel-close:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .panel-content {
            padding: 24px;
        }

        .panel-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title-icon {
            width: 16px;
            height: 16px;
        }

        .property-grid {
            display: grid;
            gap: 16px;
        }

        .property-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .property-label {
            min-width: 80px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .property-value {
            font-size: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0;
        }

        .checkbox {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .checkbox.checked {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: -2px;
            left: 1px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.15s ease;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(15, 123, 15, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #0d6e0d;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
        }

        .btn-success {
            background: var(--accent-green);
            color: white;
        }

        .btn-warning {
            background: var(--accent-yellow);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Responses */
        .response-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .response-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Loading and Empty States */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            :root {
                --panel-width: 100vw;
            }

            .main-container {
                padding: 16px;
            }

            .board-container {
                flex-direction: column;
            }

            .board-column {
                min-width: auto;
            }
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .notification.success { background: var(--accent-green); }
        .notification.warning { background: var(--accent-yellow); color: var(--text-primary); }
        .notification.error { background: var(--accent-red); }
        .notification.info { background: var(--accent-blue); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <input type="hidden" value="{{ username }}" id="take_username">
    <input type="hidden" value="{{ name }}" id="take_name">

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <i data-lucide="alert-triangle" class="header-icon"></i>
                <div>
                    <h1 class="header-title">Escalated Tasks</h1>
                    <p class="header-subtitle">Manage and track your escalated project tasks</p>
                </div>
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </header>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="assigned_by" id="assignedByBtn">
            Assigned by me
            <span class="filter-count" id="assignedByCount">0</span>
        </button>
        <button class="filter-tab" data-filter="assigned_to" id="assignedToBtn">
            Assigned to me
            <span class="filter-count" id="assignedToCount">0</span>
        </button>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <!-- Board Container -->
        <div class="board-container" id="boardContainer" style="display: none;">
            <!-- To Do Column -->
            <div class="board-column">
                <div class="column-header">
                    <span class="column-title">To Do</span>
                    <span class="column-count" id="todoCount">0</span>
                </div>
                <div class="column-content" id="todoColumn">
                    <!-- Tasks will be inserted here -->
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="board-column">
                <div class="column-header">
                    <span class="column-title">In Progress</span>
                    <span class="column-count" id="progressCount">0</span>
                </div>
                <div class="column-content" id="progressColumn">
                    <!-- Tasks will be inserted here -->
                </div>
            </div>

            <!-- Completed Column -->
            <div class="board-column">
                <div class="column-header">
                    <span class="column-title">Completed</span>
                    <span class="column-count" id="completedCount">0</span>
                </div>
                <div class="column-content" id="completedColumn">
                    <!-- Tasks will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i data-lucide="inbox" class="empty-icon"></i>
            <h3>No tasks found</h3>
            <p id="emptyDescription">You haven't assigned any tasks yet.</p>
        </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel-overlay" id="sidePanelOverlay">
        <div class="side-panel" id="sidePanel">
            <div class="panel-header">
                <h2 id="panelTitle">Task Details</h2>
                <button class="panel-close" id="panelClose">
                    <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                </button>
            </div>
            <div class="panel-content" id="panelContent">
                <!-- Content will be inserted here -->
            </div>
        </div>
    </div>
    <script>
        const developers  = {{ developers | tojson }};
    </script>
    <script src="/static/show_escalated_todo.js"></script>
</body>
</html>
